<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanz3lot Mission Control // CYBERPUNK_V2.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --cyan: #00f2ff;
            --magenta: #ff00ff;
            --blue: #0066ff;
            --danger: #ff4d4d;
            --success: #10b981;
            --accent: #8b5cf6;
            --warning: #f59e0b;
            --text: #e0faff;
            --card-bg: rgba(5, 15, 25, 0.75); 
            --glass-blur: blur(12px);
            --border-glow: 0 0 10px rgba(0, 242, 255, 0.4);
        }

        body { 
            background: url('background.png') no-repeat center center fixed; 
            background-size: cover;
            color: var(--text); 
            font-family: 'Share Tech Mono', monospace; 
            padding: 40px; 
            margin: 0; 
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .container { max-width: 1400px; margin: 0 auto; position: relative; }

        .header { 
            border-left: 4px solid var(--cyan); 
            padding-left: 20px; 
            margin-bottom: 40px;
            text-shadow: 0 0 15px var(--cyan);
        }
        .title { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin: 0; }
        .subtitle { color: var(--cyan); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; opacity: 0.7; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }

        .panel {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: var(--border-glow), inset 0 0 20px rgba(0, 242, 255, 0.05);
            padding: 24px;
            border-radius: 8px;
            position: relative;
        }

        .full-width { grid-column: span 3; border-color: rgba(16, 185, 129, 0.5); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }

        .section-label { 
            color: var(--cyan); 
            font-size: 14px; 
            font-weight: 600; 
            text-transform: uppercase; 
            margin-bottom: 20px; 
            display: block; 
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            padding-bottom: 8px;
        }

        .list { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--cyan) transparent; }
        .list-item { 
            padding: 12px 0; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; 
            align-items: center; 
            font-size: 14px; 
            padding-right: 8px;
            transition: all 0.3s ease;
        }
        .list-item:last-child { border: none; }

        .list-item::before { 
            content: ''; 
            width: 10px; 
            height: 10px; 
            margin-right: 15px; 
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: var(--text);
            flex-shrink: 0;
        }

        .cat-urgent { color: var(--danger); font-weight: 600; }
        .cat-urgent::before { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .cat-wait { color: var(--accent); }
        .cat-wait::before { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .cat-fun { color: var(--success); }
        .cat-fun::before { background: var(--success); box-shadow: 0 0 8px var(--success); }

        .todo-urgent::before { content: '🔴'; background: none; clip-path: none; width: auto; height: auto; font-size: 14px; }
        .todo-wait::before { content: '🟣'; background: none; clip-path: none; width: auto; height: auto; font-size: 14px; }
        .todo-fun::before { content: '🟢'; background: none; clip-path: none; width: auto; height: auto; font-size: 14px; }

        .deadline { font-size: 11px; color: rgba(255, 255, 255, 0.5); margin-left: auto; }
        .late-tag { 
            color: var(--danger); 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-left: 8px; 
            border: 1px solid var(--danger); 
            padding: 2px 4px; 
            border-radius: 4px; 
            box-shadow: 0 0 5px var(--danger);
        }

        .checkbox { 
            margin-left: auto; 
            cursor: pointer; 
            width: 20px; 
            height: 20px; 
            border: 1px solid var(--cyan); 
            border-radius: 2px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s; 
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.3);
        }
        .checkbox.checked { background: var(--cyan); box-shadow: 0 0 15px var(--cyan); }
        .checkbox.checked::after { content: '✓'; color: #000; font-weight: 800; font-size: 14px; }

        /* HUD & Progress */
        .hud-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 15px; }
        .spinning-orb {
            width: 80px;
            height: 80px;
            border: 2px solid var(--cyan);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            font-size: 16px;
            font-weight: bold;
            animation: pulse 2s infinite ease-in-out;
            background: rgba(0, 242, 255, 0.1);
        }
        .spinning-orb::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            border: 1px dashed var(--cyan);
            border-radius: 50%;
            animation: rotate 8s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .progress-block { width: 100%; text-align: center; }
        .progress-bar-bg { width: 100%; height: 12px; border: 1px solid var(--cyan); background: rgba(0, 242, 255, 0.1); margin-top: 10px; position: relative; padding: 2px; }
        .progress-bar-fill { height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); position: relative; width: 0%; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Bottom Loading Bar */
        .bottom-loading { grid-column: span 3; height: 2px; background: rgba(255, 255, 255, 0.1); margin-top: 20px; position: relative; overflow: hidden; }
        .bottom-loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: slide 3s infinite linear;
        }
        @keyframes slide { to { left: 100%; } }

        .footer { 
            margin-top: 20px; 
            padding-top: 24px; 
            border-top: 1px solid rgba(0, 242, 255, 0.2); 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
        }
        .legend { display: flex; gap: 16px; font-size: 11px; opacity: 0.9; background: rgba(0, 0, 0, 0.6); padding: 8px 16px; border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 4px; backdrop-filter: blur(4px); }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        .completed { opacity: 0.3 !important; text-decoration: line-through; filter: grayscale(1); }
        .night-duty { color: var(--warning); font-size: 12px; margin-top: 8px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
